syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.wellbeing";
option java_outer_classname = "AppointmentProto";

service AppointmentService {
  rpc RequestAppointment (AppointmentRequest) returns (AppointmentResponse);
  rpc CancelAppointment (CancelRequest) returns (CancelResponse);
  rpc GetAppointments (StudentRequest) returns (AppointmentList);
}

enum ServiceType {
  MEDICINE = 0;
  PSYCHOLOGY = 1;
  DENTISTRY = 2;
}

enum Status {
  REQUESTED = 0;
  CANCELLED = 1;
  ATTENDED = 2;
}

message Student {
  int32 id = 1;
  string name = 2;
  string institutionalEmail = 3;
}

message Appointment {
  int32 id = 1;
  int32 studentId = 2;
  ServiceType serviceType = 3;
  string date = 4;
  Status status = 5;
}

message AppointmentRequest {
  int32 studentId = 1;
  ServiceType serviceType = 2;
  string date = 3;
}

message AppointmentResponse {
  Appointment appointment = 1;
  bool success = 2;
}

message CancelRequest {
  int32 appointmentId = 1;
}

message CancelResponse {
  bool success = 1;
  string message = 2;
}

message StudentRequest {
  int32 studentId = 1;
}

message AppointmentList {
  repeated Appointment appointments = 1;
}